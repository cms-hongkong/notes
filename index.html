<!DOCTYPE html>

<html lang="zh-Hant">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>卡雅認音大挑戰</title>

    <style>

        :root {

            --forest-green: #1B4332;

            --leaf-green: #74C69D;

            --wood-brown: #604439;

            --sand-light: #F8F4E3;

            --text-serif: "Microsoft JhengHei", "微軟正黑體", sans-serif;

        }



        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }



        body {

            font-family: var(--text-serif);

            background: linear-gradient(135deg, #D8F3DC 0%, #95D5B2 100%);

            display: flex;

            justify-content: center;

            align-items: center;

            min-height: 100dvh;

            margin: 0;

            padding: 10px;

            overflow: hidden;

        }



        #game-container {

            background: rgba(255, 255, 255, 0.95);

            padding: clamp(10px, 4vw, 25px);

            border-radius: clamp(20px, 5vw, 40px);

            box-shadow: 0 12px 0px var(--wood-brown), 0 20px 40px rgba(0,0,0,0.15);

            width: 100%;

            max-width: 1000px;

            height: auto;

            max-height: 98dvh;

            position: relative;

            text-align: center;

            border: 6px solid var(--sand-light);

            display: flex;

            flex-direction: column;

        }



        /* 藝術標題樣式 */

        .art-title {

            font-weight: 900;

            display: flex;

            justify-content: center;

            flex-wrap: wrap;

            gap: clamp(2px, 1vw, 8px);

            filter: drop-shadow(2px 2px 0px white);

        }



        /* 遊戲進行中的標題 */

        .in-game-title {

            font-size: clamp(1.2rem, 5vw, 2.2rem);

            margin-bottom: 5px;

        }



        /* 首頁/選單的大標題 */

        .main-menu-title {

            font-size: clamp(2rem, 9vw, 4rem);

            margin-bottom: clamp(15px, 5vw, 30px);

        }



        .art-title span {

            display: inline-block;

            text-shadow: 3px 3px 0px var(--wood-brown);

        }



        /* 字體顏色與旋轉 */

        .art-title span:nth-child(1) { color: #FF6B6B; transform: rotate(-7deg); } /* 卡 */

        .art-title span:nth-child(2) { color: #FF9F45; transform: rotate(5deg); }  /* 雅 */

        .art-title span:nth-child(3) { color: #6BCB77; transform: rotate(-4deg); } /* 認 */

        .art-title span:nth-child(4) { color: #4D96FF; transform: rotate(6deg); }  /* 音 */

        .art-title span:nth-child(5) { color: #F47174; transform: rotate(-5deg); } /* 大 */

        .art-title span:nth-child(6) { color: #4ECDC4; transform: rotate(4deg); }  /* 挑 */

        .art-title span:nth-child(7) { color: #9B59B6; transform: rotate(-6deg); } /* 戰 */



        .stats-bar {

            display: flex;

            justify-content: space-between;

            margin-bottom: 8px;

            visibility: hidden;

            gap: 5px;

        }



        .badge {

            background: var(--sand-light);

            padding: 5px 12px;

            border-radius: 15px;

            font-size: clamp(0.85rem, 3vw, 1.1rem);

            font-weight: bold;

            border: 2px solid var(--wood-brown);

            white-space: nowrap;

        }



        #canvas-wrapper {

            background: white;

            border-radius: 20px;

            border: 4px solid var(--leaf-green);

            margin: 5px auto;

            width: 100%; 

            padding: 5px;

            position: relative;

        }



        canvas {

            width: 100%;

            height: auto;

            display: block;

            aspect-ratio: 1000 / 600;

        }



        #answer-area {

            display: flex;

            justify-content: center;

            gap: clamp(8px, 2.5vw, 20px);

            margin: 10px 0;

            min-height: clamp(110px, 25vw, 170px);

        }



        .animal-btn {

            background: #FFF;

            border: 3px solid var(--wood-brown);

            border-radius: clamp(15px, 4vw, 25px);

            padding: clamp(8px, 2vw, 12px);

            width: clamp(85px, 26vw, 135px);

            cursor: pointer;

            box-shadow: 0 6px 0 var(--wood-brown);

            transition: all 0.1s;

            display: flex;

            flex-direction: column;

            align-items: center;

        }



        .animal-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--wood-brown); }



        .img-container { 

            width: 100%; 

            height: clamp(50px, 14vw, 80px); 

            display: flex; 

            justify-content: center; 

            align-items: center; 

            font-size: clamp(2rem, 10vw, 3.2rem); 

        }

        .animal-img { width: 100%; height: 100%; object-fit: contain; }

        .letter-name { font-size: clamp(1.4rem, 6vw, 2.2rem); font-weight: bold; color: var(--wood-brown); }



        #overlay {

            position: absolute;

            top: 0; left: 0; width: 100%; height: 100%;

            background: rgba(255, 255, 255, 0.98);

            border-radius: clamp(20px, 5vw, 40px);

            display: flex;

            flex-direction: column;

            justify-content: center;

            align-items: center;

            z-index: 100;

            padding: 20px;

        }



        .btn-forest {

            font-family: var(--text-serif);

            background: var(--forest-green);

            color: white;

            padding: clamp(12px, 3.5vw, 18px) clamp(20px, 5vw, 35px);

            border-radius: 50px;

            font-size: clamp(1.1rem, 4vw, 1.4rem);

            border: none;

            cursor: pointer;

            box-shadow: 0 6px 0 var(--wood-brown);

            font-weight: bold;

            margin: clamp(5px, 2vw, 10px);

            width: clamp(240px, 80vw, 320px);

        }



        .rank-table-container {

            width: 100%;

            max-height: 50vh;

            overflow-y: auto;

            background: white;

            border-radius: 15px;

            border: 2px solid var(--leaf-green);

            margin: 15px 0;

        }



        .rank-table { width: 100%; border-collapse: collapse; font-size: clamp(0.8rem, 2.5vw, 0.95rem); }

        .rank-table th { background: var(--leaf-green); color: white; padding: 10px; position: sticky; top: 0; }

        .rank-table td { padding: 8px; border-bottom: 1px solid #ddd; text-align: center; }



        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }

        .shake-btn { animation: shake 0.3s; }

    </style>

</head>

<body>



<div id="game-container">

    <div id="game-header-title" class="art-title in-game-title" style="visibility: hidden;">

        <span>卡</span><span>雅</span><span>認</span><span>音</span><span>大</span><span>挑</span><span>戰</span>

    </div>



    <div class="stats-bar" id="stats-bar">

        <div class="badge" id="lv-display">LV 1</div>

        <div class="badge" id="count-display">1 / 10</div>

        <div class="badge">⭐ <span id="score-val">0</span></div>

    </div>



    <div id="canvas-wrapper">

        <canvas id="gameCanvas" width="1000" height="600"></canvas>

    </div>

    

    <div id="answer-area"></div>



    <div id="overlay">

        <div id="mode-view" style="display: flex; flex-direction: column; align-items: center; width: 100%;">

            <div class="art-title main-menu-title">

                <span>卡</span><span>雅</span><span>認</span><span>音</span><span>大</span><span>挑</span><span>戰</span>

            </div>

            <p style="color: var(--wood-brown); font-weight: bold; margin-bottom: 10px;">請選擇譜號模式</p>

            <button class="btn-forest" style="background: #2D6A4F;" onclick="selectMode('treble')">𝄞 高音譜號模式</button>

            <button class="btn-forest" style="background: #40916C;" onclick="selectMode('bass')">𝄢 低音譜號模式</button>

            <button class="btn-forest" style="background: var(--wood-brown); margin-top: 20px;" onclick="showRank()">🏆 排行榜紀錄</button>

        </div>



        <div id="level-view" style="display: none; flex-direction: column; align-items: center; width: 100%;">

            <h2 id="level-title" style="font-size: clamp(1.5rem, 5vw, 2rem); margin-bottom: 15px;">選擇難度等級</h2>

            <div id="level-buttons" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;"></div>

            <button class="btn-forest" style="background: #999; margin-top: 20px;" onclick="goBackToMode()">返回主選單</button>

        </div>



        <div id="result-view" style="display: none; width: 100%; text-align: center;">

            <h2 style="font-size: 2.2rem; color: var(--forest-green);">太棒了！完成挑戰！</h2>

            <p id="result-text" style="font-size: 1.5rem;"></p>

            <p id="time-text" style="color: var(--wood-brown); margin-bottom: 15px;"></p>

            <input type="text" id="playerNameInput" placeholder="輸入你的名字..." maxlength="10" style="padding: 12px; border-radius: 25px; border: 2px solid var(--leaf-green); margin-bottom: 15px; width: 80%; font-size: 1.1rem; text-align: center; outline: none;">

            <button class="btn-forest" onclick="submitAndRestart()">再玩一次</button>

            <button class="btn-forest" style="background: var(--leaf-green); color: var(--forest-green);" onclick="submitAndGoHome()">回到首頁</button>

        </div>



        <div id="rank-view" style="display: none; width: 100%; align-items: center;">

            <h2 style="margin: 0;">🏆 高手排行榜</h2>

            <div class="rank-table-container">

                <table class="rank-table">

                    <thead><tr><th>排名</th><th>名稱</th><th>譜</th><th>LV</th><th>得分</th><th>秒數</th></tr></thead>

                    <tbody id="rank-body"></tbody>

                </table>

            </div>

            <button class="btn-forest" onclick="goBackToMode()">返回主選單</button>

        </div>

    </div>

</div>



<script>

    const canvas = document.getElementById('gameCanvas');

    const ctx = canvas.getContext('2d');

    

    let currentMode = 'treble';

    let curLv = 1;

    let score = 0;

    let targetNote = "";

    let lastTargetNote = "";

    let questionsLeft = 10;

    let startTime, endTime;

    let isAnswering = false;



    const s = 85; 



    const config = {

        treble: {

            clef: "𝄞",

            symbolOffset: 65,

            fontSizeMult: 8,

            levels: [

                { notes: ["C4", "D4", "E4"] },

                { notes: ["C4", "D4", "E4", "F4", "G4"] },

                { notes: ["C4", "D4", "E4", "F4", "G4", "A4", "B4"] },

                { notes: ["C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5", "D5"] },

                { notes: ["C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5"] }

            ],

            steps: { "C4": -2, "D4": -1, "E4": 0, "F4": 1, "G4": 2, "A4": 3, "B4": 4, "C5": 5, "D5": 6, "E5": 7, "F5": 8, "G5": 9 }

        },

        bass: {

            clef: "𝄢",

            symbolOffset: 90,

            fontSizeMult: 5.8,

            levels: [

                { notes: ["C4", "B3", "A3"] },

                { notes: ["C4", "B3", "A3", "G3", "F3"] },

                { notes: ["C4", "B3", "A3", "G3", "F3", "E3", "D3"] },

                { notes: ["C4", "B3", "A3", "G3", "F3", "E3", "D3", "C3", "B2"] },

                { notes: ["C4", "B3", "A3", "G3", "F3", "E3", "D3", "C3", "B2", "A2", "G2", "F2", "E2"] }

            ],

            steps: { "C4": -2, "B3": -1, "A3": 0, "G3": 1, "F3": 2, "E3": 3, "D3": 4, "C3": 5, "B2": 6, "A2": 7, "G2": 8, "F2": 9, "E2": 10 }

        }

    };



    const animalData = {

        'C': { img: 'cat-h.PNG', emoji: '🐱' }, 'D': { img: 'dog-h.PNG', emoji: '🐶' },

        'E': { img: 'elephant-h.PNG', emoji: '🐘' }, 'F': { img: 'frog-h.PNG', emoji: '🐸' },

        'G': { img: 'giraffe-h.PNG', emoji: '🦒' }, 'A': { img: 'ape-h.PNG', emoji: '🦧' },

        'B': { img: 'bear-h.PNG', emoji: '🐻' }

    };



    function selectMode(mode) {

        currentMode = mode;

        document.getElementById('mode-view').style.display = 'none';

        document.getElementById('level-view').style.display = 'flex';

        const btnContainer = document.getElementById('level-buttons');

        btnContainer.innerHTML = '';

        for(let i=1; i<=5; i++) {

            const btn = document.createElement('button');

            btn.className = 'btn-forest';

            btn.style.width = "clamp(110px, 40vw, 150px)";

            btn.innerText = "LV " + i;

            btn.onclick = () => startGame(i);

            btnContainer.appendChild(btn);

        }

        drawScene();

    }



    function startGame(lv) {

        curLv = lv; score = 0; questionsLeft = 10;

        startTime = new Date();

        document.getElementById('overlay').style.display = 'none';

        document.getElementById('stats-bar').style.visibility = 'visible';

        document.getElementById('game-header-title').style.visibility = 'visible';

        nextQuestion();

    }



    function drawScene() {

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const modeConf = config[currentMode];

        const colors = ["#FF0000", "#FFA500", "#FFD700", "#008000", "#800080"];

        const staffStartY = currentMode === 'treble' ? canvas.height/2 + 2*s : canvas.height/2 - 2*s;

        

        for (let i = 0; i < curLv; i++) {

            const y = currentMode === 'treble' ? staffStartY - (i * s) : staffStartY + (i * s);

            ctx.strokeStyle = colors[i];

            ctx.lineWidth = 6;

            ctx.beginPath();

            ctx.moveTo(80, y); ctx.lineTo(920, y);

            ctx.stroke();

        }



        ctx.fillStyle = "#111";

        ctx.font = `${s * modeConf.fontSizeMult}px serif`;

        const clefY = currentMode === 'treble' ? staffStartY + modeConf.symbolOffset : staffStartY + 3*s + modeConf.symbolOffset;

        ctx.fillText(modeConf.clef, 90, clefY);



        if (targetNote) {

            const steps = modeConf.steps[targetNote];

            const y = currentMode === 'treble' ? staffStartY - (steps * (s/2)) : staffStartY + (steps * (s/2));

            const x = canvas.width / 2 + 80;

            ctx.fillStyle = "black";

            ctx.beginPath();

            ctx.ellipse(x, y, s * 0.65, s * 0.46, -Math.PI / 8, 0, 2 * Math.PI);

            ctx.fill();

            if (steps <= -2 || steps >= 10) {

                ctx.strokeStyle = "#333"; ctx.lineWidth = 6;

                ctx.beginPath(); ctx.moveTo(x - s, y); ctx.lineTo(x + s, y); ctx.stroke();

            }

        }

    }



    function nextQuestion() {

        isAnswering = false;

        const pool = config[currentMode].levels[curLv-1].notes;

        do { targetNote = pool[Math.floor(Math.random() * pool.length)]; } while (targetNote === lastTargetNote && pool.length > 1);

        lastTargetNote = targetNote;

        document.getElementById('count-display').innerText = `${11 - questionsLeft} / 10`;

        document.getElementById('score-val').innerText = score;

        document.getElementById('lv-display').innerText = `LV ${curLv}`;

        drawScene();

        generateChoices();

    }



    function generateChoices() {

        const correctLetter = targetNote.charAt(0);

        const allLetters = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];

        let choices = [correctLetter];

        let others = allLetters.filter(l => l !== correctLetter).sort(() => Math.random() - 0.5);

        while (choices.length < 3) choices.push(others.pop());

        choices.sort(() => Math.random() - 0.5);

        

        const area = document.getElementById('answer-area');

        area.innerHTML = '';

        choices.forEach(letter => {

            const btn = document.createElement('button');

            btn.className = 'animal-btn';

            const data = animalData[letter];

            btn.innerHTML = `<div class="img-container"><img src="${data.img}" class="animal-img" onerror="this.style.display='none'; this.parentElement.innerText='${data.emoji}';"></div><div class="letter-name">${letter}</div>`;

            btn.onclick = () => {

                if (isAnswering) return;

                isAnswering = true;

                if (letter === correctLetter) {

                    score++; btn.style.background = "#90EE90";

                    btn.querySelector('.letter-name').innerText = "✔️ " + letter;

                } else {

                    btn.style.background = "#FFB3B3"; btn.classList.add('shake-btn');

                    btn.querySelector('.letter-name').innerText = "❌ " + letter;

                }

                setTimeout(() => { questionsLeft--; if (questionsLeft > 0) nextQuestion(); else showResult(); }, 400);

            };

            area.appendChild(btn);

        });

    }



    function showResult() {

        endTime = new Date();

        const duration = Math.floor((endTime - startTime) / 1000);

        document.getElementById('overlay').style.display = 'flex';

        document.getElementById('mode-view').style.display = 'none';

        document.getElementById('level-view').style.display = 'none';

        document.getElementById('result-view').style.display = 'flex';

        document.getElementById('result-view').style.flexDirection = 'column';

        document.getElementById('result-view').style.alignItems = 'center';

        document.getElementById('result-text').innerText = `得分：${score} / 10`;

        document.getElementById('time-text').innerText = `總耗時：${duration} 秒`;

    }



    function saveRecord() {

        const name = document.getElementById('playerNameInput').value.trim() || "匿名挑戰者";

        const duration = Math.floor((endTime - startTime) / 1000);

        const record = { name, mode: currentMode === 'treble' ? "高" : "低", lv: curLv, score, time: duration, date: new Date().toLocaleDateString() };

        let history = JSON.parse(localStorage.getItem('kayaNoteRank') || "[]");

        history.push(record);

        localStorage.setItem('kayaNoteRank', JSON.stringify(history));

    }



    function submitAndRestart() { saveRecord(); startGame(curLv); }

    function submitAndGoHome() { saveRecord(); goHome(); }



    function goHome() {

        document.getElementById('playerNameInput').value = "";

        document.getElementById('result-view').style.display = 'none';

        document.getElementById('overlay').style.display = 'flex';

        document.getElementById('mode-view').style.display = 'flex';

        document.getElementById('stats-bar').style.visibility = 'hidden';

        document.getElementById('game-header-title').style.visibility = 'hidden';

        targetNote = ""; drawScene();

    }



    function goBackToMode() {

        document.getElementById('level-view').style.display = 'none';

        document.getElementById('rank-view').style.display = 'none';

        document.getElementById('mode-view').style.display = 'flex';

        document.getElementById('stats-bar').style.visibility = 'hidden';

        document.getElementById('game-header-title').style.visibility = 'hidden';

        targetNote = ""; drawScene();

    }



    function showRank() {

        document.getElementById('mode-view').style.display = 'none';

        document.getElementById('rank-view').style.display = 'flex';

        let data = JSON.parse(localStorage.getItem('kayaNoteRank') || "[]");

        data.sort((a, b) => b.score - a.score || a.time - b.time);

        const body = document.getElementById('rank-body');

        body.innerHTML = data.slice(0, 15).map((d, i) => `<tr><td>${i+1}</td><td>${d.name}</td><td>${d.mode}</td><td>${d.lv}</td><td>${d.score}</td><td>${d.time}s</td></tr>`).join('') || '<tr><td colspan="6">暫時未有紀錄</td></tr>';

    }



    window.onload = () => drawScene();

</script>

</body>

</html>
