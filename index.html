<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMS認音大挑戰 - 綜合篇</title>
    <style>
        :root {
            --forest-green: #1B4332;
            --leaf-green: #74C69D;
            --wood-brown: #604439;
            --sand-light: #F8F4E3;
            --text-serif: "PMingLiU", "SimSun", "Times New Roman", serif;
        }

        body {
            font-family: var(--text-serif);
            background: linear-gradient(135deg, #D8F3DC 0%, #95D5B2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            color: var(--forest-green);
        }

        #game-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 40px;
            box-shadow: 0 12px 0px var(--wood-brown), 0 20px 40px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 980px;
            position: relative;
            text-align: center;
            border: 6px solid var(--sand-light);
        }

        h1 { font-size: 2.5rem; margin: 10px 0; }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            visibility: hidden; /* 遊戲開始前隱藏 */
        }

        .badge {
            background: var(--sand-light);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border: 2px solid var(--wood-brown);
        }

        #canvas-wrapper {
            background: white;
            border-radius: 25px;
            border: 6px solid var(--leaf-green);
            margin: 15px auto;
            width: 98%; 
            padding: 12px; 
            box-sizing: border-box;
        }

        canvas { width: 100%; height: auto; display: block; }

        #answer-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
            min-height: 180px;
        }

        /* 按鈕樣式 */
        .animal-btn {
            background: #FFF;
            border: 4px solid var(--wood-brown);
            border-radius: 30px;
            padding: 15px;
            width: 140px;
            cursor: pointer;
            box-shadow: 0 8px 0 var(--wood-brown);
            transition: all 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .animal-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 var(--wood-brown); }

        .img-container { width: 80px; height: 80px; display: flex; justify-content: center; align-items: center; font-size: 3.5rem; }
        .animal-img { width: 100%; height: 100%; object-fit: contain; }
        .letter-name { font-size: 2.5rem; font-weight: bold; color: var(--wood-brown); }

        /* Overlay 視窗控制 */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 34px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }

        .btn-forest {
            font-family: var(--text-serif);
            background: var(--forest-green);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.3rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--wood-brown);
            font-weight: bold;
            margin: 8px;
            width: 280px;
        }

        .btn-mode { background: #2D6A4F; font-size: 1.6rem; height: 100px; }

        input#playerNameInput {
            padding: 12px; font-size: 1.2rem; border-radius: 50px; border: 3px solid var(--leaf-green); text-align: center; width: 250px; margin: 10px;
        }

        .rank-table { width: 100%; border-collapse: collapse; }
        .rank-table th { background: var(--leaf-green); color: white; padding: 10px; }
        .rank-table td { padding: 8px; border-bottom: 1px solid #ddd; text-align: center; }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        .shake-btn { animation: shake 0.3s; }
    </style>
</head>
<body>

<div id="game-container">
    <h1 id="main-title">CMS認音大挑戰</h1>
    
    <div class="stats-bar" id="stats-bar">
        <div class="badge" id="lv-display">LV 1</div>
        <div class="badge" id="count-display">1 / 10</div>
        <div class="badge">⭐ <span id="score-val">0</span></div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="gameCanvas" width="1000" height="650"></canvas>
    </div>
    
    <div id="answer-area"></div>

    <div id="overlay">
        <div id="mode-view">
            <h1 style="font-size: 3rem;">請選擇譜號</h1>
            <button class="btn-forest btn-mode" onclick="selectMode('treble')">𝄞 高音譜號</button>
            <button class="btn-forest btn-mode" onclick="selectMode('bass')">𝄢 低音譜號</button>
            <br>
            <button class="btn-forest" style="background: var(--wood-brown); width: 200px;" onclick="showRank()">🏆 排行榜</button>
        </div>

        <div id="level-view" style="display: none;">
            <h2 id="level-title" style="font-size: 2rem;">選擇等級</h2>
            <div id="level-buttons" style="display: flex; flex-wrap: wrap; justify-content: center; max-width: 700px;"></div>
            <button class="btn-forest" style="background: #999; margin-top: 20px;" onclick="goBackToMode()">返回模式選擇</button>
        </div>

        <div id="result-view" style="display: none;">
            <h2 style="font-size: 3rem;">太利害啦！</h2>
            <p id="result-text" style="font-size: 1.5rem;"></p>
            <p id="time-text" style="color: var(--wood-brown); font-weight: bold;"></p>
            <input type="text" id="playerNameInput" placeholder="輸入名字..." maxlength="10">
            <button class="btn-forest" onclick="submitAndRestart()">再玩一次</button>
            <button class="btn-forest" style="background: var(--leaf-green); color: var(--forest-green);" onclick="submitAndGoHome()">回首頁</button>
        </div>

        <div id="rank-view" style="display: none; width: 95%;">
            <h2>🏆 高手排行榜</h2>
            <div style="max-height: 300px; overflow-y: auto; background: white; border-radius: 15px; margin-bottom: 15px;">
                <table class="rank-table">
                    <thead><tr><th>排名</th><th>名稱</th><th>類型</th><th>LV</th><th>分數</th><th>時間</th></tr></thead>
                    <tbody id="rank-body"></tbody>
                </table>
            </div>
            <button class="btn-forest" onclick="goBackToMode()">返回</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let currentMode = 'treble'; // 'treble' or 'bass'
    let curLv = 1;
    let score = 0;
    let targetNote = "";
    let lastTargetNote = "";
    let questionsLeft = 10;
    let startTime, endTime;
    let isAnswering = false;

    const s = 91; 

    // 遊戲數據定義
    const config = {
        treble: {
            clef: "𝄞",
            symbolOffset: 90,
            fontSizeMult: 8.6,
            rankKey: "cmsNoteRankTreble",
            levels: [
                { name: "Level 1 (C, D, E)", notes: ["C4", "D4", "E4"] },
                { name: "Level 2 (C - G)", notes: ["C4", "D4", "E4", "F4", "G4"] },
                { name: "Level 3 (C - B)", notes: ["C4", "D4", "E4", "F4", "G4", "A4", "B4"] },
                { name: "Level 4 (C - D')", notes: ["C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5", "D5"] },
                { name: "Level 5 (C - G')", notes: ["C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5"] }
            ],
            steps: { "C4": -2, "D4": -1, "E4": 0, "F4": 1, "G4": 2, "A4": 3, "B4": 4, "C5": 5, "D5": 6, "E5": 7, "F5": 8, "G5": 9 }
        },
        bass: {
            clef: "𝄢",
            symbolOffset: 95,
            fontSizeMult: 6.075,
            rankKey: "cmsNoteRankBass",
            levels: [
                { name: "Level 1 (C, B, A)", notes: ["C4", "B3", "A3"] },
                { name: "Level 2 (C - F)", notes: ["C4", "B3", "A3", "G3", "F3"] },
                { name: "Level 3 (C - D)", notes: ["C4", "B3", "A3", "G3", "F3", "E3", "D3"] },
                { name: "Level 4 (C - 低音B)", notes: ["C4", "B3", "A3", "G3", "F3", "E3", "D3", "C3", "B2"] },
                { name: "Level 5 (C - 低音E)", notes: ["C4", "B3", "A3", "G3", "F3", "E3", "D3", "C3", "B2", "A2", "G2", "F2", "E2"] }
            ],
            steps: { "C4": -2, "B3": -1, "A3": 0, "G3": 1, "F3": 2, "E3": 3, "D3": 4, "C3": 5, "B2": 6, "A2": 7, "G2": 8, "F2": 9, "E2": 10 }
        }
    };

    const animalData = {
        'C': { img: 'cat-h.PNG', emoji: '🐱' },
        'D': { img: 'dog-h.PNG', emoji: '🐶' },
        'E': { img: 'elephant-h.PNG', emoji: '🐘' },
        'F': { img: 'frog-h.PNG', emoji: '🐸' },
        'G': { img: 'giraffe-h.PNG', emoji: '🦒' },
        'A': { img: 'ape-h.PNG', emoji: '🦧' },
        'B': { img: 'bear-h.PNG', emoji: '🐻' }
    };

    // 視窗切換邏輯
    function selectMode(mode) {
        currentMode = mode;
        document.getElementById('mode-view').style.display = 'none';
        document.getElementById('level-view').style.display = 'block';
        document.getElementById('level-title').innerText = mode === 'treble' ? "高音譜號 - 選擇等級" : "低音譜號 - 選擇等級";
        
        const btnContainer = document.getElementById('level-buttons');
        btnContainer.innerHTML = '';
        config[currentMode].levels.forEach((lv, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn-forest';
            btn.innerText = lv.name;
            btn.onclick = () => startGame(index + 1);
            btnContainer.appendChild(btn);
        });
        drawScene();
    }

    function goBackToMode() {
        document.getElementById('level-view').style.display = 'none';
        document.getElementById('rank-view').style.display = 'none';
        document.getElementById('mode-view').style.display = 'flex';
        document.getElementById('stats-bar').style.visibility = 'hidden';
        targetNote = "";
        drawScene();
    }

    // 遊戲核心邏輯
    function startGame(lv) {
        curLv = lv;
        score = 0;
        questionsLeft = 10;
        startTime = new Date();
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('stats-bar').style.visibility = 'visible';
        document.getElementById('score-val').innerText = "0";
        document.getElementById('lv-display').innerText = `LV ${curLv}`;
        nextQuestion();
    }

    function nextQuestion() {
        isAnswering = false;
        const pool = config[currentMode].levels[curLv-1].notes;
        do {
            targetNote = pool[Math.floor(Math.random() * pool.length)];
        } while (targetNote === lastTargetNote && pool.length > 1);
        lastTargetNote = targetNote;
        
        document.getElementById('count-display').innerText = `${11 - questionsLeft} / 10`;
        drawScene();
        generateChoices();
    }

    function drawScene() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const modeConf = config[currentMode];
        const colors = ["#FF0000", "#FFA500", "#FFD700", "#008000", "#800080"];
        
        // 繪製五線譜 (固定 5 條線)
        const staffStartY = currentMode === 'treble' ? canvas.height/2 + 2*s : canvas.height/2 - 2*s;
        
        for (let i = 0; i < 5; i++) {
            const y = currentMode === 'treble' ? staffStartY - (i * s) : staffStartY + (i * s);
            ctx.strokeStyle = colors[i] || "#333";
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(100, y); ctx.lineTo(900, y);
            ctx.stroke();
        }

        // 譜號
        ctx.fillStyle = "#111";
        ctx.font = `${s * modeConf.fontSizeMult}px serif`;
        const clefX = 110;
        const clefY = currentMode === 'treble' ? staffStartY + modeConf.symbolOffset : staffStartY + 3*s + modeConf.symbolOffset;
        ctx.fillText(modeConf.clef, clefX, clefY);

        // 音符
        if (targetNote) {
            const steps = modeConf.steps[targetNote];
            const baseY = currentMode === 'treble' ? staffStartY : staffStartY;
            const y = currentMode === 'treble' ? baseY - (steps * (s/2)) : baseY + (steps * (s/2));
            const x = canvas.width / 2 + 100;

            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.ellipse(x, y, s * 0.66, s * 0.47, -Math.PI / 8, 0, 2 * Math.PI);
            ctx.fill();

            // 加線
            if (steps <= -2 || steps >= 10) {
                ctx.strokeStyle = "#333";
                ctx.lineWidth = 5;
                ctx.beginPath(); ctx.moveTo(x - s, y); ctx.lineTo(x + s, y); ctx.stroke();
            }
        }
    }

    function generateChoices() {
        const correctLetter = targetNote.charAt(0);
        const allLetters = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
        let choices = [correctLetter];
        let others = allLetters.filter(l => l !== correctLetter).sort(() => Math.random() - 0.5);
        while (choices.length < 3) choices.push(others.pop());
        choices.sort(() => Math.random() - 0.5);

        const area = document.getElementById('answer-area');
        area.innerHTML = '';
        choices.forEach(letter => {
            const btn = document.createElement('button');
            btn.className = 'animal-btn';
            const data = animalData[letter];
            
            btn.innerHTML = `
                <div class="img-container">
                    <img src="${data.img}" class="animal-img" onerror="this.style.display='none'; this.parentElement.innerText='${data.emoji}';">
                </div>
                <div class="letter-name">${letter}</div>
            `;

            btn.onclick = () => {
                if (isAnswering) return;
                isAnswering = true;
                const isCorrect = (letter === correctLetter);
                const letterDiv = btn.querySelector('.letter-name');
                
                if (isCorrect) {
                    score++;
                    btn.style.background = "#90EE90";
                    letterDiv.innerText = "✔️ " + letter;
                } else {
                    btn.style.background = "#FFB3B3";
                    btn.classList.add('shake-btn');
                    letterDiv.innerText = "❌ " + letter;
                }

                document.getElementById('score-val').innerText = score;
                setTimeout(() => {
                    questionsLeft--;
                    if (questionsLeft > 0) nextQuestion(); else showResult();
                }, 400);
            };
            area.appendChild(btn);
        });
    }

    function showResult() {
        endTime = new Date();
        const duration = Math.floor((endTime - startTime) / 1000);
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('mode-view').style.display = 'none';
        document.getElementById('level-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'block';
        document.getElementById('result-text').innerText = `獲得分數：${score} / 10`;
        document.getElementById('time-text').innerText = `耗時：${duration} 秒`;
    }

    function saveRecord() {
        const name = document.getElementById('playerNameInput').value.trim() || "匿名";
        const duration = Math.floor((endTime - startTime) / 1000);
        const record = { 
            name, 
            mode: currentMode === 'treble' ? "高音" : "低音", 
            lv: curLv, 
            score, 
            time: duration, 
            date: new Date().toLocaleDateString() 
        };
        let history = JSON.parse(localStorage.getItem('cmsNoteRankCombined') || "[]");
        history.push(record);
        localStorage.setItem('cmsNoteRankCombined', JSON.stringify(history));
    }

    function submitAndRestart() { saveRecord(); startGame(curLv); }
    function submitAndGoHome() { saveRecord(); goHome(); }

    function goHome() {
        document.getElementById('playerNameInput').value = "";
        document.getElementById('result-view').style.display = 'none';
        document.getElementById('mode-view').style.display = 'flex';
        document.getElementById('stats-bar').style.visibility = 'hidden';
        targetNote = "";
        drawScene();
    }

    function showRank() {
        document.getElementById('mode-view').style.display = 'none';
        document.getElementById('rank-view').style.display = 'flex';
        let data = JSON.parse(localStorage.getItem('cmsNoteRankCombined') || "[]");
        data.sort((a, b) => b.score - a.score || a.time - b.time);
        
        const body = document.getElementById('rank-body');
        body.innerHTML = data.slice(0, 10).map((d, i) => `
            <tr><td>${i+1}</td><td>${d.name}</td><td>${d.mode}</td><td>${d.lv}</td><td>${d.score}</td><td>${d.time}s</td></tr>
        `).join('') || '<tr><td colspan="6">未有紀錄</td></tr>';
    }

    window.onload = () => drawScene();
</script>
</body>
</html>
