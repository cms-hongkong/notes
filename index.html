<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡雅認音大挑戰 - 進階修正版</title>
    <style>
        :root {
            --forest-green: #1B4332;
            --leaf-green: #74C69D;
            --wood-brown: #604439;
            --sand-light: #F8F4E3;
            --text-serif: "Microsoft JhengHei", "微軟正黑體", sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--text-serif);
            background: linear-gradient(135deg, #D8F3DC 0%, #95D5B2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }

        #game-container {
            background: rgba(255, 255, 255, 0.98);
            padding: 30px;
            border-radius: 50px;
            box-shadow: 0 20px 0px var(--wood-brown), 0 40px 80px rgba(0,0,0,0.2);
            width: 96vw;
            height: 94vh;
            position: relative;
            text-align: center;
            border: 10px solid var(--sand-light);
            display: flex;
            flex-direction: column;
        }

        .art-title {
            font-weight: 900;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .in-game-title { font-size: 4rem; margin-bottom: 10px; }
        .main-menu-title { font-size: 8rem; margin-bottom: 40px; }

        .art-title span {
            display: inline-block;
            text-shadow: 4px 4px 0px var(--wood-brown);
        }

        .art-title span:nth-child(1) { color: #FF6B6B; transform: rotate(-7deg); }
        .art-title span:nth-child(2) { color: #FF9F45; transform: rotate(5deg); }
        .art-title span:nth-child(3) { color: #6BCB77; transform: rotate(-4deg); }
        .art-title span:nth-child(4) { color: #4D96FF; transform: rotate(6deg); }
        .art-title span:nth-child(5) { color: #F47174; transform: rotate(-5deg); }
        .art-title span:nth-child(6) { color: #4ECDC4; transform: rotate(4deg); }
        .art-title span:nth-child(7) { color: #9B59B6; transform: rotate(-6deg); }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 15px;
            visibility: hidden;
        }

        .badge {
            background: var(--sand-light);
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 2rem;
            font-weight: bold;
            border: 4px solid var(--wood-brown);
        }

        #canvas-wrapper {
            background: white;
            border-radius: 30px;
            border: 6px solid var(--leaf-green);
            margin: 10px auto;
            width: 100%;
            flex-grow: 1;
            position: relative;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #answer-area {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
            min-height: 280px;
        }

        .animal-btn {
            background: #FFF;
            border: 6px solid var(--wood-brown);
            border-radius: 35px;
            padding: 15px;
            width: 320px;
            cursor: pointer;
            box-shadow: 0 12px 0 var(--wood-brown);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .img-container { 
            width: 100%; 
            height: 140px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 7rem; 
        }
        .animal-img { width: 100%; height: 100%; object-fit: contain; }
        .letter-name { font-size: 4rem; font-weight: bold; color: var(--wood-brown); }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 40px;
        }

        .btn-forest {
            font-family: var(--text-serif);
            background: var(--forest-green);
            color: white;
            padding: 25px 50px;
            border-radius: 80px;
            font-size: 2.5rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 0 var(--wood-brown);
            font-weight: bold;
            margin: 15px;
            min-width: 500px;
        }

        .rank-table { width: 100%; border-collapse: collapse; font-size: 1.8rem; }
        .rank-table th { background: var(--leaf-green); color: white; padding: 20px; }
        .rank-table td { padding: 15px; border-bottom: 1px solid #ddd; text-align: center; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="game-header-title" class="art-title in-game-title" style="visibility: hidden;">
        <span>卡</span><span>雅</span><span>認</span><span>音</span><span>大</span><span>挑</span><span>戰</span>
    </div>

    <div class="stats-bar" id="stats-bar">
        <div class="badge" id="lv-display">LV 1</div>
        <div class="badge" id="count-display">1 / 10</div>
        <div class="badge">⭐ <span id="score-val">0</span></div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="gameCanvas"></canvas>
    </div>
    
    <div id="answer-area"></div>

    <div id="overlay">
        <div id="mode-view" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
            <div class="art-title main-menu-title">
                <span>卡</span><span>雅</span><span>認</span><span>音</span><span>大</span><span>挑</span><span>戰</span>
            </div>
            <button class="btn-forest" style="background: #2D6A4F;" onclick="selectMode('treble')">𝄞 高音譜號模式</button>
            <button class="btn-forest" style="background: #40916C;" onclick="selectMode('bass')">𝄢 低音譜號模式</button>
            <button class="btn-forest" style="background: var(--wood-brown); margin-top: 30px;" onclick="showRank()">🏆 排行榜紀錄</button>
        </div>

        <div id="level-view" style="display: none; flex-direction: column; align-items: center; width: 100%;">
            <h2 style="font-size: 4rem; margin-bottom: 30px;">選擇難度等級</h2>
            <div id="level-buttons" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px;"></div>
            <button class="btn-forest" style="background: #999; margin-top: 40px;" onclick="goBackToMode()">返回主選單</button>
        </div>

        <div id="result-view" style="display: none; width: 100%; text-align: center; flex-direction: column; align-items: center;">
            <h2 style="font-size: 5rem; color: var(--forest-green);">完成挑戰！</h2>
            <p id="result-text" style="font-size: 3rem;"></p>
            <input type="text" id="playerNameInput" placeholder="輸入名字" maxlength="10" style="padding: 20px; border-radius: 40px; font-size: 2rem; width: 600px; text-align: center; margin-bottom: 30px;">
            <div style="display: flex; gap: 20px;">
                <button class="btn-forest" style="min-width: 300px;" onclick="submitAndRestart()">再玩一次</button>
                <button class="btn-forest" style="min-width: 300px; background: var(--leaf-green);" onclick="submitAndGoHome()">回首頁</button>
            </div>
        </div>

        <div id="rank-view" style="display: none; width: 100%; flex-direction: column; align-items: center;">
            <h2 style="font-size: 4rem;">🏆 排行榜</h2>
            <div style="width: 90%; background: white; border-radius: 20px; overflow: auto; margin-bottom: 20px;">
                <table class="rank-table">
                    <thead><tr><th>排名</th><th>名稱</th><th>模式</th><th>得分</th><th>時間</th></tr></thead>
                    <tbody id="rank-body"></tbody>
                </table>
            </div>
            <button class="btn-forest" onclick="goBackToMode()">返回</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('canvas-wrapper');
    
    let currentMode = 'treble';
    let curLv = 1;
    let score = 0;
    let targetNote = "";
    let lastNote = ""; // 用於防止連續重複答案
    let questionsLeft = 10;
    let startTime, isAnswering = false;
    let s = 0; 

    function resizeCanvas() {
        canvas.width = wrapper.clientWidth;
        canvas.height = wrapper.clientHeight;
        s = canvas.height / 8;
        drawScene();
    }

    window.addEventListener('resize', resizeCanvas);

    const config = {
        treble: {
            clef: "𝄞",
            levels: [
                { notes: ["C4", "D4", "E4"] },
                { notes: ["C4", "D4", "E4", "F4", "G4"] },
                { notes: ["C4", "D4", "E4", "F4", "G4", "A4", "B4"] },
                { notes: ["C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5", "D5"] },
                { notes: ["C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5"] }
            ],
            steps: { "C4": -2, "D4": -1, "E4": 0, "F4": 1, "G4": 2, "A4": 3, "B4": 4, "C5": 5, "D5": 6, "E5": 7, "F5": 8, "G5": 9 }
        },
        bass: {
            clef: "𝄢",
            levels: [
                { notes: ["G2", "A2", "B2"] },
                { notes: ["G2", "A2", "B2", "C3", "D3"] },
                { notes: ["G2", "A2", "B2", "C3", "D3", "E3", "F3"] },
                { notes: ["G2", "A2", "B2", "C3", "D3", "E3", "F3", "G3", "A3"] },
                { notes: ["E2", "F2", "G2", "A2", "B2", "C3", "D3", "E3", "F3", "G3", "A3", "B3", "C4"] }
            ],
            // 修正映射：G2 是底線 (0), C4 是上加一線 (10), E2 是下加一線 (-2)
            steps: { 
                "E2": -2, "F2": -1, "G2": 0, "A2": 1, "B2": 2, "C3": 3, "D3": 4, 
                "E3": 5, "F3": 6, "G3": 7, "A3": 8, "B3": 9, "C4": 10 
            }
        }
    };

    const animalData = {
        'C': { img: 'cat-h.PNG', emoji: '🐱' }, 'D': { img: 'dog-h.PNG', emoji: '🐶' },
        'E': { img: 'elephant-h.PNG', emoji: '🐘' }, 'F': { img: 'frog-h.PNG', emoji: '🐸' },
        'G': { img: 'giraffe-h.PNG', emoji: '🦒' }, 'A': { img: 'ape-h.PNG', emoji: '🦧' },
        'B': { img: 'bear-h.PNG', emoji: '🐻' }
    };

    function drawScene() {
        if (!s) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const modeConf = config[currentMode];
        
        const colors = ["#FF0000", "#FFA500", "#FFD700", "#008000", "#800080"];
        const staffMidY = canvas.height / 2;
        const staffTotalHeight = 4 * s;
        const staffTopY = staffMidY - staffTotalHeight / 2;
        
        // 修改 2：根據等級顯示線條數量 (從底部往上畫)
        for (let i = 0; i < curLv; i++) {
            const y = staffTopY + (4 - i) * s; 
            ctx.strokeStyle = colors[i] || "#333";
            ctx.lineWidth = Math.max(6, s / 15);
            ctx.beginPath();
            ctx.moveTo(canvas.width * 0.1, y);
            ctx.lineTo(canvas.width * 0.9, y);
            ctx.stroke();
        }

        // 修改 1：譜號位置調整 (低音譜號向下移一個間距)
        ctx.fillStyle = "#111";
        ctx.font = `${s * 6}px serif`;
        ctx.textAlign = "left";
        ctx.textBaseline = "middle";
        // 原本 treble 是 staffTopY + 2.5s, bass 是 staffTopY + 1s. 
        // 現在 bass 改為 staffTopY + 2s (下移一個 s)
        const clefY = currentMode === 'treble' ? staffTopY + 2 * s + (s * 0.5) : staffTopY + 2 * s;
        ctx.fillText(modeConf.clef, canvas.width * 0.12, clefY);

        // 繪製題目音符
        if (targetNote) {
            const steps = modeConf.steps[targetNote];
            const y = staffTopY + 4 * s - (steps * (s / 2));
            const x = canvas.width / 2;
            
            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.ellipse(x, y, s * 0.6, s * 0.45, -Math.PI / 8, 0, 2 * Math.PI);
            ctx.fill();
            
            // 繪製加線 (上加線或下加線)
            if (steps <= -2 || steps >= 10) {
                ctx.strokeStyle = "#000";
                ctx.lineWidth = Math.max(6, s / 15);
                ctx.beginPath();
                ctx.moveTo(x - s, y); ctx.lineTo(x + s, y);
                ctx.stroke();
            }
        }
    }

    function selectMode(mode) {
        currentMode = mode;
        document.getElementById('mode-view').style.display = 'none';
        document.getElementById('level-view').style.display = 'flex';
        const btnContainer = document.getElementById('level-buttons');
        btnContainer.innerHTML = '';
        for(let i=1; i<=5; i++) {
            const btn = document.createElement('button');
            btn.className = 'btn-forest';
            btn.style.minWidth = "250px";
            btn.innerText = "LV " + i;
            btn.onclick = () => startGame(i);
            btnContainer.appendChild(btn);
        }
        resizeCanvas();
    }

    function startGame(lv) {
        curLv = lv; score = 0; questionsLeft = 10;
        lastNote = ""; // 重置紀錄
        startTime = new Date();
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('stats-bar').style.visibility = 'visible';
        document.getElementById('game-header-title').style.visibility = 'visible';
        nextQuestion();
    }

    function nextQuestion() {
        isAnswering = false;
        const pool = config[currentMode].levels[curLv-1].notes;
        
        // 修改 4：防止連續出現相同答案
        let newNote;
        do {
            newNote = pool[Math.floor(Math.random() * pool.length)];
        } while (newNote === lastNote && pool.length > 1);
        
        targetNote = newNote;
        lastNote = targetNote;

        document.getElementById('count-display').innerText = `${11 - questionsLeft} / 10`;
        document.getElementById('score-val').innerText = score;
        document.getElementById('lv-display').innerText = `LV ${curLv}`;
        drawScene();
        generateChoices();
    }

    function generateChoices() {
        const correctLetter = targetNote.charAt(0);
        const allLetters = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
        let choices = [correctLetter];
        let others = allLetters.filter(l => l !== correctLetter).sort(() => Math.random() - 0.5);
        while (choices.length < 3) choices.push(others.pop());
        choices.sort(() => Math.random() - 0.5);
        
        const area = document.getElementById('answer-area');
        area.innerHTML = '';
        choices.forEach(letter => {
            const btn = document.createElement('button');
            btn.className = 'animal-btn';
            const data = animalData[letter];
            btn.innerHTML = `<div class="img-container"><img src="${data.img}" class="animal-img" onerror="this.style.display='none'; this.parentElement.innerText='${data.emoji}';"></div><div class="letter-name">${letter}</div>`;
            btn.onclick = () => {
                if (isAnswering) return;
                isAnswering = true;
                if (letter === correctLetter) {
                    score++; btn.style.background = "#90EE90";
                } else {
                    btn.style.background = "#FFB3B3";
                }
                setTimeout(() => { questionsLeft--; if (questionsLeft > 0) nextQuestion(); else showResult(); }, 600);
            };
            area.appendChild(btn);
        });
    }

    function showResult() {
        const duration = Math.floor((new Date() - startTime) / 1000);
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('level-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'flex';
        document.getElementById('result-text').innerText = `得分：${score} / 10 | 耗時：${duration} 秒`;
    }

    function submitAndRestart() { saveRecord(); startGame(curLv); }
    function submitAndGoHome() { saveRecord(); goHome(); }

    function saveRecord() {
        const name = document.getElementById('playerNameInput').value.trim() || "匿名";
        const duration = Math.floor((new Date() - startTime) / 1000);
        const record = { name, mode: currentMode === 'treble' ? "高" : "低", score, time: duration };
        let history = JSON.parse(localStorage.getItem('kayaNoteRank') || "[]");
        history.push(record);
        localStorage.setItem('kayaNoteRank', JSON.stringify(history));
    }

    function goHome() {
        document.getElementById('result-view').style.display = 'none';
        document.getElementById('mode-view').style.display = 'flex';
        document.getElementById('stats-bar').style.visibility = 'hidden';
        document.getElementById('game-header-title').style.visibility = 'hidden';
        targetNote = ""; drawScene();
    }

    function goBackToMode() {
        document.getElementById('level-view').style.display = 'none';
        document.getElementById('rank-view').style.display = 'none';
        document.getElementById('mode-view').style.display = 'flex';
        targetNote = ""; drawScene();
    }

    function showRank() {
        document.getElementById('mode-view').style.display = 'none';
        document.getElementById('rank-view').style.display = 'flex';
        let data = JSON.parse(localStorage.getItem('kayaNoteRank') || "[]");
        data.sort((a, b) => b.score - a.score || a.time - b.time);
        document.getElementById('rank-body').innerHTML = data.slice(0, 10).map((d, i) => `<tr><td>${i+1}</td><td>${d.name}</td><td>${d.mode}</td><td>${d.score}</td><td>${d.time}s</td></tr>`).join('') || '<tr><td colspan="5">尚未有紀錄</td></tr>';
    }

    window.onload = resizeCanvas;
</script>
</body>
</html>
