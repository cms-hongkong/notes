<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>樂譜練習 - 動物認音挑戰</title>
    <style>
        :root {
            --mint: #B2F2BB;
            --pink: #FFD6E0;
            --blue: #A2D2FF;
            --yellow: #FEF9E7;
            --text: #5B5B5B;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(180deg, #E3F2FD 0%, #F3E5F5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text);
            padding: 10px;
            box-sizing: border-box;
        }

        #game-container {
            background: white;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 0px #CBD5E0, 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 950px;
            position: relative;
            text-align: center;
            border: 6px solid white;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .player-info-title {
            width: 100%;
            font-size: 1.6rem;
            color: #FF85A1;
            font-weight: bold;
            margin-bottom: 10px;
            display: none;
        }

        .score-board, .level-badge, .count-badge {
            background: var(--yellow);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border: 2px solid #FAD7A0;
        }

        canvas {
            width: 100%;
            height: auto;
            max-height: 480px;
            background: white;
            border-radius: 15px;
            margin: 10px 0;
        }

        /* 動物答案按鈕區域 */
        #letter-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin: 20px 0;
        }

        .animal-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            border: none;
            background: transparent;
            transition: transform 0.1s;
        }

        .animal-btn:active { transform: scale(0.9); }

        .animal-img-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            background-color: var(--yellow);
            object-fit: cover;
            margin-bottom: 5px;
        }

        .animal-label {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text);
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .input-group { margin-bottom: 25px; }

        input#playerNameInput {
            padding: 15px;
            font-size: 1.3rem;
            border-radius: 50px;
            border: 3px solid var(--pink);
            outline: none;
            text-align: center;
            width: 250px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .btn-fancy {
            background: #FF85A1; color: white; padding: 12px 30px;
            border-radius: 50px; font-size: 1.2rem; border: none;
            cursor: pointer; box-shadow: 0 5px 0 #D6336C;
            font-weight: bold; margin: 8px; width: 260px;
        }

        /* 排行榜表格 */
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.9rem;
        }
        .leaderboard-table th, .leaderboard-table td {
            border-bottom: 1px solid #eee;
            padding: 10px 5px;
            text-align: center;
        }
        .leaderboard-table th { background-color: var(--yellow); }

        .tab-buttons { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
        .tab-btn { padding: 5px 12px; border-radius: 10px; border: 1px solid #ccc; background: white; cursor: pointer; }
        .tab-btn.active { background: var(--pink); border-color: #FF85A1; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="player-display-title" class="player-info-title">名稱 的認音挑戰</div>
    <div class="header">
        <div class="level-badge" id="current-level-display">LV 1</div>
        <div class="count-badge" id="count-display">1 / 10</div>
        <div class="score-board">⭐ <span id="score">0</span></div>
    </div>

    <canvas id="staffCanvas" width="1000" height="520"></canvas>
    
    <div id="letter-buttons">
        </div>

    <div id="overlay">
        <div id="menu-view">
            <h2 style="color: #FF85A1;">準備好挑戰了嗎？🍭</h2>
            <div class="input-group">
                <input type="text" id="playerNameInput" placeholder="請輸入你的名字" maxlength="10">
            </div>
            <p style="margin-bottom: 10px; color: #888;">選擇等級開始：</p>
            <button class="btn-fancy" onclick="checkStart(1)">Level 1 (C, D, E)</button>
            <button class="btn-fancy" onclick="checkStart(2)">Level 2 (C - G)</button>
            <button class="btn-fancy" onclick="checkStart(3)">Level 3 (C - B)</button>
            <button class="btn-fancy" onclick="checkStart(4)">Level 4 (C - D')</button>
            <button class="btn-fancy" onclick="checkStart(5)">Level 5 (C - G')</button>
            <br>
            <button class="btn-fancy" style="background: var(--blue); box-shadow: 0 5px 0 #5DA9EE; width: 200px; font-size: 1rem;" onclick="showLeaderboard()">查看排行榜 🏆</button>
        </div>

        <div id="result-view" style="display: none;">
            <h2 id="result-title" style="color: #FF85A1; font-size: 2.2rem;">太利害啦！</h2>
            <p id="result-text" style="font-size: 1.5rem; margin: 10px 0;"></p>
            <p id="time-text" style="color: #666; font-weight: bold;"></p>
            <button class="btn-fancy" onclick="restartGame()">再玩一次</button>
            <button class="btn-fancy" style="background: var(--blue); box-shadow: 0 5px 0 #5DA9EE;" onclick="showMenu()">返回首頁</button>
        </div>

        <div id="leaderboard-view" style="display: none; width: 95%;">
            <h2 style="color: #FF85A1;">🏆 榮譽排行榜</h2>
            <div class="tab-buttons" id="level-tabs">
                <button class="tab-btn active" onclick="updateLeaderboardUI('all')">全部</button>
                <button class="tab-btn" onclick="updateLeaderboardUI(1)">LV 1</button>
                <button class="tab-btn" onclick="updateLeaderboardUI(2)">LV 2</button>
                <button class="tab-btn" onclick="updateLeaderboardUI(3)">LV 3</button>
                <button class="tab-btn" onclick="updateLeaderboardUI(4)">LV 4</button>
                <button class="tab-btn" onclick="updateLeaderboardUI(5)">LV 5</button>
            </div>
            <div style="max-height: 280px; overflow-y: auto;">
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th>排名</th><th>名稱</th><th>LV</th><th>題數</th><th>耗時</th><th>日期</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body"></tbody>
                </table>
            </div>
            <button class="btn-fancy" style="margin-top: 15px; width: 180px;" onclick="showMenu()">回首頁</button>
            <br>
            <button class="btn-fancy" style="background: #ccc; box-shadow: 0 5px 0 #999; width: 150px; font-size: 0.8rem; padding: 5px;" onclick="clearScores()">清除所有紀錄</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('staffCanvas');
    const ctx = canvas.getContext('2d');
    
    let currentLevel = 1;
    let score = 0;
    let targetNote = "";
    let gameActive = false;
    let questionsLeft = 10;
    
    // 排行榜與名稱
    let playerName = "";
    let startTime, endTime;

    // --- 修改點 4: 線距增加 3 (原本放大後是45, 現在 45+3=48) ---
    const s = 48; 
    const centerY = canvas.height / 2 + 60;

    const levels = {
        1: ["C4", "D4", "E4"],
        2: ["C4", "D4", "E4", "F4", "G4"],
        3: ["C4", "D4", "E4", "F4", "G4", "A4", "B4"],
        4: ["C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5", "D5"],
        5: ["C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5"]
    };

    const noteStepMap = {
        "C4": -2, "D4": -1, "E4": 0, "F4": 1, "G4": 2, "A4": 3, "B4": 4,
        "C5": 5, "D5": 6, "E5": 7, "F5": 8, "G5": 9
    };

    // 修改點 3: 動物圖片對應
    const animalConfig = {
        'C': 'cat.PNG', 'D': 'dog.PNG', 'E': 'elephant.PNG',
        'F': 'frog.PNG', 'G': 'giraffe.PNG', 'A': 'ape.PNG', 'B': 'bear.PNG'
    };

    // 初始化按鈕
    function initButtons() {
        const btnContainer = document.getElementById('letter-buttons');
        btnContainer.innerHTML = '';
        Object.keys(animalConfig).forEach(letter => {
            const btn = document.createElement('button');
            btn.className = 'animal-btn';
            btn.onclick = () => handleInput(letter);
            btn.innerHTML = `
                <img src="${animalConfig[letter]}" class="animal-img-circle" onerror="this.src='https://via.placeholder.com/80?text=${letter}'">
                <div class="animal-label">${letter}</div>
            `;
            btnContainer.appendChild(btn);
        });
    }

    function drawStaff() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "#D1D5DB";
        ctx.lineWidth = 4;
        for (let i = 0; i < currentLevel; i++) {
            let y = centerY - (i * s);
            ctx.beginPath(); ctx.moveTo(80, y); ctx.lineTo(920, y); ctx.stroke();
        }
        // 高音譜號對應放大 (配合 s=48)
        ctx.fillStyle = "#5B5B5B"; ctx.font = `${s * 6}px Arial`;
        ctx.fillText("𝄞", 100, centerY - s * 0.5);
        if (targetNote) renderNote();
    }

    function renderNote() {
        const steps = noteStepMap[targetNote]; 
        const y = centerY - (steps * (s / 2));
        const x = canvas.width / 2 + 50;
        ctx.strokeStyle = "#333"; ctx.fillStyle = "#333"; ctx.lineWidth = 5;
        ctx.beginPath();
        // 音符大小配合 s 調整
        ctx.ellipse(x, y, s * 0.7, s * 0.5, -Math.PI / 8, 0, 2 * Math.PI);
        ctx.fill(); ctx.stroke();
        if (targetNote === "C4") {
            ctx.beginPath(); ctx.moveTo(x - s, y); ctx.lineTo(x + s, y); ctx.stroke();
        }
    }

    function checkStart(lv) {
        const nameInput = document.getElementById('playerNameInput').value.trim();
        if (nameInput.length < 2) {
            alert("請先輸入你的名字！");
            return;
        }
        playerName = nameInput;
        // 修改點 2: 個人化標題
        document.getElementById('player-display-title').innerText = `${playerName} 的認音挑戰`;
        document.getElementById('player-display-title').style.display = 'block';
        currentLevel = lv;
        restartGame();
    }

    function restartGame() {
        score = 0; questionsLeft = 10; gameActive = true;
        startTime = new Date();
        document.getElementById('score').innerText = "0";
        document.getElementById('current-level-display').innerText = `LV ${currentLevel}`;
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('menu-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'none';
        document.getElementById('leaderboard-view').style.display = 'none';
        next();
    }

    function handleInput(letter) {
        if (!gameActive) return;
        const correctLetter = targetNote.charAt(0);
        if (letter === correctLetter) {
            score += 1;
            document.getElementById('score').innerText = score;
            questionsLeft--;
            if (questionsLeft > 0) {
                next();
            } else {
                endTime = new Date();
                endSession();
            }
        } else {
            canvas.style.transform = "translateX(10px)";
            setTimeout(() => canvas.style.transform = "translateX(0)", 100);
        }
    }

    function next() {
        const pool = levels[currentLevel];
        targetNote = pool[Math.floor(Math.random() * pool.length)];
        document.getElementById('count-display').innerText = `${11 - questionsLeft} / 10`;
        drawStaff();
    }

    function endSession() {
        gameActive = false;
        const duration = Math.floor((endTime - startTime) / 1000);
        saveScore(playerName, currentLevel, score, duration);
        
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('result-view').style.display = 'block';
        document.getElementById('result-text').innerText = `你在 Level ${currentLevel} 答對了 ${score} 題！`;
        document.getElementById('time-text').innerText = `耗時：${duration} 秒`;
        // 修改點 5: 修改成功訊息文字
        document.getElementById('result-title').innerText = score >= 8 ? "太利害啦！🎉" : "再接再厲！💪";
    }

    function saveScore(name, lv, score, time) {
        const record = { name, lv, score, time, date: new Date().toLocaleString([], {month: '2-digit', day: '2-digit', hour: '2-digit', minute:'2-digit'}) };
        let history = JSON.parse(localStorage.getItem('musicGameRankV2') || "[]");
        history.push(record);
        localStorage.setItem('musicGameRankV2', JSON.stringify(history));
    }

    function showLeaderboard() {
        document.getElementById('menu-view').style.display = 'none';
        document.getElementById('leaderboard-view').style.display = 'block';
        updateLeaderboardUI('all');
    }

    function updateLeaderboardUI(filter) {
        const btns = document.querySelectorAll('.tab-btn');
        btns.forEach(b => b.classList.toggle('active', (filter === 'all' && b.innerText === '全部') || b.innerText === `LV ${filter}`));
        
        const body = document.getElementById('leaderboard-body');
        let history = JSON.parse(localStorage.getItem('musicGameRankV2') || "[]");
        if (filter !== 'all') history = history.filter(item => item.lv === filter);

        // 排序：題數多 > 時間少 > 日期早
        history.sort((a, b) => (b.score - a.score) || (a.time - b.time));

        body.innerHTML = history.slice(0, 50).map((item, idx) => `
            <tr><td>${idx + 1}</td><td>${item.name}</td><td>${item.lv}</td><td>${item.score}</td><td>${item.time}s</td><td>${item.date}</td></tr>
        `).join('') || '<tr><td colspan="6">尚無紀錄</td></tr>';
    }

    function clearScores() {
        if (confirm("確定要清除排行榜嗎？")) {
            localStorage.removeItem('musicGameRankV2');
            updateLeaderboardUI('all');
        }
    }

    function showMenu() {
        document.getElementById('result-view').style.display = 'none';
        document.getElementById('leaderboard-view').style.display = 'none';
        document.getElementById('menu-view').style.display = 'block';
        document.getElementById('player-display-title').style.display = 'none';
    }

    initButtons();
    drawStaff();
</script>

</body>
</html>
