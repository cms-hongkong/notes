<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMS認音大挑戰</title>
    <style>
        :root {
            --forest-deep: #2D5A27;
            --forest-light: #7FB069;
            --wood: #8B5A2B;
            --sand: #F9F1DC;
            --grass: #D4FC79;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, var(--grass) 0%, #96E6A1 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            color: #333;
        }

        #game-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 45px;
            box-shadow: 0 15px 0px var(--wood), 0 25px 50px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 950px;
            position: relative;
            text-align: center;
            border: 8px solid white;
        }

        .player-header {
            font-size: 1.8rem;
            color: var(--forest-deep);
            font-weight: bold;
            margin-bottom: 15px;
            display: none; /* 開始遊戲後顯示 */
            text-shadow: 1px 1px 0px white;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .badge {
            background: var(--sand);
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: bold;
            border: 3px solid var(--wood);
            color: var(--wood);
        }

        canvas {
            width: 100%;
            height: auto;
            background: white;
            border-radius: 25px;
            margin: 15px 0;
            border: 5px solid var(--forest-light);
        }

        /* 3 個選項按鈕 */
        #answer-area {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 25px 0;
            min-height: 160px;
        }

        .animal-btn {
            background: white;
            border: 4px solid var(--wood);
            border-radius: 35px;
            padding: 15px;
            width: 150px;
            cursor: pointer;
            box-shadow: 0 8px 0 var(--wood);
            transition: all 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .animal-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 var(--wood);
        }

        .animal-img {
            width: 90px;
            height: 90px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .animal-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--wood);
        }

        /* 覆蓋介面 */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 38px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 30px;
            box-sizing: border-box;
        }

        input#playerName {
            padding: 15px 25px;
            font-size: 1.5rem;
            border-radius: 50px;
            border: 4px solid var(--forest-light);
            outline: none;
            text-align: center;
            width: 300px;
            margin-bottom: 25px;
            color: var(--forest-deep);
        }

        .btn-forest {
            background: var(--forest-deep);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.4rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--wood);
            font-weight: bold;
            margin: 10px;
            width: 320px;
        }

        /* 排行榜表格 */
        .rank-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }
        .rank-table th { background: var(--forest-light); color: white; padding: 12px; }
        .rank-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }

        .tab-group { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
        .tab-btn {
            padding: 5px 12px; border-radius: 10px; border: 2px solid var(--forest-deep);
            background: white; cursor: pointer; font-weight: bold;
        }
        .tab-btn.active { background: var(--forest-deep); color: white; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="title-bar" class="player-header">遊戲者 的認音挑戰</div>
    
    <div class="stats-row">
        <div class="badge" id="lv-tag">LV 1</div>
        <div class="badge" id="count-tag">1 / 10</div>
        <div class="badge">⭐ <span id="score-val">0</span></div>
    </div>

    <canvas id="gameCanvas" width="1000" height="600"></canvas>
    
    <div id="answer-area">
        </div>

    <div id="overlay">
        <div id="start-screen">
            <h1 style="color: var(--forest-deep); font-size: 3rem; margin-bottom: 10px;">CMS認音大挑戰</h1>
            <p style="color: var(--wood); font-weight: bold;">輸入名字後，點選關卡開始！</p>
            <input type="text" id="playerName" placeholder="請輸入你的名字" maxlength="10">
            <div style="display: flex; flex-wrap: wrap; justify-content: center;">
                <button class="btn-forest" onclick="handleStart(1)">Level 1 (C, D, E)</button>
                <button class="btn-forest" onclick="handleStart(2)">Level 2 (C - G)</button>
                <button class="btn-forest" onclick="handleStart(3)">Level 3 (C - B)</button>
                <button class="btn-forest" onclick="handleStart(4)">Level 4 (C - D')</button>
                <button class="btn-forest" onclick="handleStart(5)">Level 5 (C - G')</button>
            </div>
            <button class="btn-forest" style="background: var(--wood); width: 220px; margin-top: 20px;" onclick="viewRank()">🏆 查看排行榜</button>
        </div>

        <div id="end-screen" style="display: none;">
            <h2 id="end-title" style="color: var(--forest-deep); font-size: 3rem;">太利害啦！</h2>
            <p id="end-msg" style="font-size: 1.8rem; margin: 15px 0;"></p>
            <p id="time-msg" style="color: var(--wood); font-weight: bold;"></p>
            <button class="btn-forest" onclick="resetGame()">再玩一次</button>
            <button class="btn-forest" style="background: var(--forest-light);" onclick="goHome()">回首頁</button>
        </div>

        <div id="rank-screen" style="display: none; width: 100%;">
            <h2 style="color: var(--forest-deep);">CMS認音大挑戰 - 高手排行榜</h2>
            <div class="tab-group" id="rank-tabs">
                <button class="tab-btn active" onclick="loadRank('all')">全部</button>
                <button class="tab-btn" onclick="loadRank(1)">LV 1</button>
                <button class="tab-btn" onclick="loadRank(2)">LV 2</button>
                <button class="tab-btn" onclick="loadRank(3)">LV 3</button>
                <button class="tab-btn" onclick="loadRank(4)">LV 4</button>
                <button class="tab-btn" onclick="loadRank(5)">LV 5</button>
            </div>
            <div style="max-height: 300px; overflow-y: auto; width: 100%;">
                <table class="rank-table">
                    <thead><tr><th>排名</th><th>名稱</th><th>LV</th><th>分數</th><th>秒數</th><th>日期</th></tr></thead>
                    <tbody id="rank-list"></tbody>
                </table>
            </div>
            <button class="btn-forest" style="margin-top: 20px; width: 180px;" onclick="goHome()">回首頁</button>
            <br>
            <button onclick="clearRank()" style="background:none; border:none; color:#999; cursor:pointer; text-decoration:underline;">清除排行榜</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let curLv = 1;
    let score = 0;
    let targetNote = "";
    let isGameOn = false;
    let qCount = 10;
    let pName = "";
    let tStart, tEnd;

    // --- 修改點 4: 線距增加 10 (基底 45 -> 55) ---
    const s = 55; 
    const baseLineY = canvas.height / 2 + 50;
    // --- 修改點 4: 高音譜號下移 30 ---
    const clefDown = 30;

    const notesSet = {
        1: ["C4", "D4", "E4"],
        2: ["C4", "D4", "E4", "F4", "G4"],
        3: ["C4", "D4", "E4", "F4", "G4", "A4", "B4"],
        4: ["C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5", "D5"],
        5: ["C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5"]
    };

    const imgMap = {
        'C': 'cat-h.PNG', 'D': 'dog-h.PNG', 'E': 'elephant-h.PNG',
        'F': 'frog-h.PNG', 'G': 'giraffe-h.PNG', 'A': 'ape-h.PNG', 'B': 'bear-h.PNG'
    };

    const stepMap = {
        "C4": -2, "D4": -1, "E4": 0, "F4": 1, "G4": 2, "A4": 3, "B4": 4,
        "C5": 5, "D5": 6, "E5": 7, "F5": 8, "G5": 9
    };

    function drawScene() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "#444";
        ctx.lineWidth = 4;
        
        // 畫五線譜
        for (let i = 0; i < curLv; i++) {
            let y = baseLineY - (i * s);
            ctx.beginPath(); ctx.moveTo(80, y); ctx.lineTo(920, y); ctx.stroke();
        }

        // 譜號調整
        ctx.fillStyle = "#222"; 
        ctx.font = `${s * 7}px Arial`; 
        ctx.fillText("𝄞", 100, (baseLineY - s * 0.4) + clefDown);

        if (targetNote) {
            const steps = stepMap[targetNote]; 
            const y = baseLineY - (steps * (s / 2));
            const x = canvas.width / 2 + 50;

            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.ellipse(x, y, s * 0.7, s * 0.5, -Math.PI / 8, 0, 2 * Math.PI);
            ctx.fill();

            if (targetNote === "C4") {
                ctx.beginPath(); ctx.moveTo(x - s, y); ctx.lineTo(x + s, y); ctx.stroke();
            }
        }
    }

    function handleStart(lv) {
        const input = document.getElementById('playerName').value.trim();
        if (input.length < 2) {
            alert("請先輸入你的名字（2-10字）！");
            return;
        }
        pName = input;
        curLv = lv;
        document.getElementById('title-bar').innerText = `${pName} 的認音挑戰`;
        document.getElementById('title-bar').style.display = 'block';
        resetGame();
    }

    function resetGame() {
        score = 0; qCount = 10; isGameOn = true;
        tStart = new Date();
        document.getElementById('score-val').innerText = "0";
        document.getElementById('lv-tag').innerText = `LV ${curLv}`;
        document.getElementById('overlay').style.display = 'none';
        nextQ();
    }

    // --- 修改點 3: 隨機 3 選項 ---
    function pickChoices(correct) {
        const pool = [...new Set(notesSet[curLv].map(n => n.charAt(0)))];
        let items = [correct];
        let others = pool.filter(i => i !== correct);
        
        while (items.length < 3 && others.length > 0) {
            let idx = Math.floor(Math.random() * others.length);
            items.push(others.splice(idx, 1)[0]);
        }
        items.sort(() => Math.random() - 0.5); // 打亂

        const area = document.getElementById('answer-area');
        area.innerHTML = '';
        items.forEach(letter => {
            const b = document.createElement('button');
            b.className = 'animal-btn';
            b.onclick = () => checkAns(letter);
            b.innerHTML = `
                <img src="${imgMap[letter]}" class="animal-img" onerror="this.src='https://via.placeholder.com/90?text=${letter}'">
                <div class="animal-name">${letter}</div>
            `;
            area.appendChild(b);
        });
    }

    function checkAns(choice) {
        if (!isGameOn) return;
        if (choice === targetNote.charAt(0)) {
            score++;
            document.getElementById('score-val').innerText = score;
        }
        qCount--;
        if (qCount > 0) nextQ(); else finish();
    }

    function nextQ() {
        const p = notesSet[curLv];
        targetNote = p[Math.floor(Math.random() * p.length)];
        document.getElementById('count-tag').innerText = `${11 - qCount} / 10`;
        drawScene();
        pickChoices(targetNote.charAt(0));
    }

    function finish() {
        isGameOn = false;
        tEnd = new Date();
        const sec = Math.floor((tEnd - tStart) / 1000);
        
        // 儲存排行榜
        const rec = { name: pName, lv: curLv, score, time: sec, date: new Date().toLocaleDateString() };
        let history = JSON.parse(localStorage.getItem('cmsRankData') || "[]");
        history.push(rec);
        localStorage.setItem('cmsRankData', JSON.stringify(history));

        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('end-screen').style.display = 'block';
        document.getElementById('end-msg').innerText = `${pName}，你獲得了 ${score} 分！`;
        document.getElementById('time-msg').innerText = `耗時：${sec} 秒`;
    }

    function loadRank(filter) {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('rank-screen').style.display = 'block';
        
        const tabs = document.querySelectorAll('.tab-btn');
        tabs.forEach(t => t.classList.toggle('active', (filter === 'all' && t.innerText === '全部') || t.innerText === `LV ${filter}`));

        let data = JSON.parse(localStorage.getItem('cmsRankData') || "[]");
        if (filter !== 'all') data = data.filter(d => d.lv === filter);
        
        // 排序邏輯
        data.sort((a, b) => (b.score - a.score) || (a.time - b.time));

        const list = document.getElementById('rank-list');
        list.innerHTML = data.slice(0, 10).map((d, i) => `
            <tr><td>${i+1}</td><td>${d.name}</td><td>${d.lv}</td><td>${d.score}</td><td>${d.time}s</td><td>${d.date}</td></tr>
        `).join('') || '<tr><td colspan="6">尚無紀錄</td></tr>';
    }

    function viewRank() { loadRank('all'); }
    function clearRank() { if(confirm("確定清除？")) { localStorage.removeItem('cmsRankData'); loadRank('all'); } }
    function goHome() { 
        document.getElementById('title-bar').style.display = 'none';
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('start-screen').style.display = 'block';
        document.getElementById('end-screen').style.display = 'none';
        document.getElementById('rank-screen').style.display = 'none';
    }

    window.onload = drawScene;
</script>
</body>
</html>
