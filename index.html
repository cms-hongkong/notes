<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMS認音大挑戰 - 藝術風格版</title>
    <style>
        :root {
            --forest-green: #1B4332;
            --leaf-green: #74C69D;
            --wood-brown: #604439;
            --sand-light: #F8F4E3;
            /* 選用比較圓潤嘅字體 */
            --text-serif: "Microsoft JhengHei", "微軟正黑體", "Rounded Mplus 1c", sans-serif;
        }

        body {
            font-family: var(--text-serif);
            background: linear-gradient(135deg, #D8F3DC 0%, #95D5B2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            color: var(--forest-green);
        }

        #game-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 40px;
            box-shadow: 0 12px 0px var(--wood-brown), 0 20px 40px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 980px;
            position: relative;
            text-align: center;
            border: 6px solid var(--sand-light);
        }

        /* 第一頁標題藝術風格 */
        .art-title {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 10px;
            filter: drop-shadow(3px 3px 0px white);
        }

        .art-title span {
            display: inline-block;
            padding: 0 5px;
            text-shadow: 4px 4px 0px var(--wood-brown);
            transform: rotate(-5deg);
        }
        
        /* 每個字唔同顏色，對應動物色彩風格 */
        .art-title span:nth-child(1) { color: #FF6B6B; transform: rotate(-8deg); } /* C */
        .art-title span:nth-child(2) { color: #4ECDC4; transform: rotate(5deg); }  /* M */
        .art-title span:nth-child(3) { color: #FFD93D; transform: rotate(-4deg); } /* S */
        .art-title span:nth-child(4) { color: #6BCB77; transform: rotate(6deg); }  /* 認 */
        .art-title span:nth-child(5) { color: #4D96FF; transform: rotate(-5deg); } /* 音 */
        .art-title span:nth-child(6) { color: #F47174; transform: rotate(4deg); }  /* 大 */
        .art-title span:nth-child(7) { color: #FF9F45; transform: rotate(-6deg); } /* 挑 */
        .art-title span:nth-child(8) { color: #9B59B6; transform: rotate(7deg); }  /* 戰 */

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            visibility: hidden;
        }

        .badge {
            background: var(--sand-light);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border: 2px solid var(--wood-brown);
        }

        #canvas-wrapper {
            background: white;
            border-radius: 25px;
            border: 6px solid var(--leaf-green);
            margin: 15px auto;
            width: 98%; 
            padding: 12px; 
            box-sizing: border-box;
        }

        canvas { width: 100%; height: auto; display: block; }

        #answer-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
            min-height: 180px;
        }

        .animal-btn {
            background: #FFF;
            border: 4px solid var(--wood-brown);
            border-radius: 30px;
            padding: 15px;
            width: 140px;
            cursor: pointer;
            box-shadow: 0 8px 0 var(--wood-brown);
            transition: all 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .animal-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 var(--wood-brown); }

        .img-container { width: 80px; height: 80px; display: flex; justify-content: center; align-items: center; font-size: 3.5rem; }
        .animal-img { width: 100%; height: 100%; object-fit: contain; }
        .letter-name { font-size: 2.5rem; font-weight: bold; color: var(--wood-brown); }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 34px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }

        .btn-forest {
            font-family: var(--text-serif);
            background: var(--forest-green);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.3rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--wood-brown);
            font-weight: bold;
            margin: 8px;
            width: 280px;
        }

        /* 排行榜視圖：垂直置中 */
        #rank-view {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .rank-table-container {
            width: 90%;
            max-height: 400px;
            overflow-y: auto;
            background: white;
            border-radius: 20px;
            border: 3px solid var(--leaf-green);
            margin: 20px 0;
        }

        .rank-table { width: 100%; border-collapse: collapse; }
        .rank-table th { background: var(--leaf-green); color: white; padding: 12px; position: sticky; top: 0; }
        .rank-table td { padding: 10px; border-bottom: 1px solid #ddd; text-align: center; font-weight: bold; }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        .shake-btn { animation: shake 0.3s; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats-bar" id="stats-bar">
        <div class="badge" id="lv-display">LV 1</div>
        <div class="badge" id="count-display">1 / 10</div>
        <div class="badge">⭐ <span id="score-val">0</span></div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="gameCanvas" width="1000" height="650"></canvas>
    </div>
    
    <div id="answer-area"></div>

    <div id="overlay">
        <div id="mode-view" style="display: flex; flex-direction: column; align-items: center;">
            <div class="art-title">
                <span>C</span><span>M</span><span>S</span><span>認</span><span>音</span><span>大</span><span>挑</span><span>戰</span>
            </div>
            <p style="color: var(--wood-brown); font-weight: bold; font-size: 1.2rem; margin-bottom: 15px;">請選擇挑戰譜號：</p>
            <button class="btn-forest" style="height: 80px; font-size: 1.8rem;" onclick="selectMode('treble')">𝄞 高音譜號</button>
            <button class="btn-forest" style="height: 80px; font-size: 1.8rem;" onclick="selectMode('bass')">𝄢 低音譜號</button>
            <button class="btn-forest" style="background: var(--wood-brown); width: 220px; margin-top: 30px;" onclick="showRank()">🏆 高手排行榜</button>
        </div>

        <div id="level-view" style="display: none;">
            <h2 id="level-title" style="font-size: 2.2rem; margin-bottom: 20px;">選擇等級</h2>
            <div id="level-buttons" style="display: flex; flex-wrap: wrap; justify-content: center; max-width: 700px;"></div>
            <button class="btn-forest" style="background: #999; margin-top: 25px; width: 200px;" onclick="goBackToMode()">返回</button>
        </div>

        <div id="result-view" style="display: none;">
            <h2 style="font-size: 3rem; color: var(--forest-green);">太利害啦！</h2>
            <p id="result-text" style="font-size: 1.8rem; margin: 10px 0;"></p>
            <p id="time-text" style="font-size: 1.2rem; color: var(--wood-brown); margin-bottom: 20px;"></p>
            <input type="text" id="playerNameInput" placeholder="你的名字..." maxlength="10">
            <button class="btn-forest" onclick="submitAndRestart()">再玩一次</button>
            <button class="btn-forest" style="background: var(--leaf-green); color: var(--forest-green);" onclick="submitAndGoHome()">回首頁</button>
        </div>

        <div id="rank-view">
            <h1 style="margin: 0;">🏆 高手排行榜</h1>
            <div class="rank-table-container">
                <table class="rank-table">
                    <thead><tr><th>排名</th><th>名稱</th><th>譜號</th><th>LV</th><th>分數</th><th>耗時</th></tr></thead>
                    <tbody id="rank-body"></tbody>
                </table>
            </div>
            <button class="btn-forest" style="width: 200px;" onclick="goBackToMode()">返回主選單</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let currentMode = 'treble';
    let curLv = 1;
    let score = 0;
    let targetNote = "";
    let lastTargetNote = "";
    let questionsLeft = 10;
    let startTime, endTime;
    let isAnswering = false;

    const s = 91; 

    const config = {
        treble: {
            clef: "𝄞",
            symbolOffset: 70, // 移高 20px (原本 90)
            fontSizeMult: 8.6,
            levels: [
                { notes: ["C4", "D4", "E4"] },
                { notes: ["C4", "D4", "E4", "F4", "G4"] },
                { notes: ["C4", "D4", "E4", "F4", "G4", "A4", "B4"] },
                { notes: ["C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5", "D5"] },
                { notes: ["C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5"] }
            ],
            steps: { "C4": -2, "D4": -1, "E4": 0, "F4": 1, "G4": 2, "A4": 3, "B4": 4, "C5": 5, "D5": 6, "E5": 7, "F5": 8, "G5": 9 }
        },
        bass: {
            clef: "𝄢",
            symbolOffset: 95,
            fontSizeMult: 6.075,
            levels: [
                { notes: ["C4", "B3", "A3"] },
                { notes: ["C4", "B3", "A3", "G3", "F3"] },
                { notes: ["C4", "B3", "A3", "G3", "F3", "E3", "D3"] },
                { notes: ["C4", "B3", "A3", "G3", "F3", "E3", "D3", "C3", "B2"] },
                { notes: ["C4", "B3", "A3", "G3", "F3", "E3", "D3", "C3", "B2", "A2", "G2", "F2", "E2"] }
            ],
            steps: { "C4": -2, "B3": -1, "A3": 0, "G3": 1, "F3": 2, "E3": 3, "D3": 4, "C3": 5, "B2": 6, "A2": 7, "G2": 8, "F2": 9, "E2": 10 }
        }
    };

    const animalData = {
        'C': { img: 'cat-h.PNG', emoji: '🐱' }, 'D': { img: 'dog-h.PNG', emoji: '🐶' },
        'E': { img: 'elephant-h.PNG', emoji: '🐘' }, 'F': { img: 'frog-h.PNG', emoji: '🐸' },
        'G': { img: 'giraffe-h.PNG', emoji: '🦒' }, 'A': { img: 'ape-h.PNG', emoji: '🦧' },
        'B': { img: 'bear-h.PNG', emoji: '🐻' }
    };

    function selectMode(mode) {
        currentMode = mode;
        document.getElementById('mode-view').style.display = 'none';
        document.getElementById('rank-view').style.display = 'none';
        document.getElementById('level-view').style.display = 'flex';
        document.getElementById('level-title').innerText = mode === 'treble' ? "高音譜號 - 選擇等級" : "低音譜號 - 選擇等級";
        
        const btnContainer = document.getElementById('level-buttons');
        btnContainer.innerHTML = '';
        const labels = ["Level 1", "Level 2", "Level 3", "Level 4", "Level 5"];
        labels.forEach((label, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn-forest';
            btn.innerText = label;
            btn.onclick = () => startGame(index + 1);
            btnContainer.appendChild(btn);
        });
        drawScene();
    }

    function startGame(lv) {
        curLv = lv; score = 0; questionsLeft = 10;
        startTime = new Date();
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('stats-bar').style.visibility = 'visible';
        document.getElementById('score-val').innerText = "0";
        document.getElementById('lv-display').innerText = `LV ${curLv}`;
        nextQuestion();
    }

    function drawScene() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const modeConf = config[currentMode];
        const colors = ["#FF0000", "#FFA500", "#FFD700", "#008000", "#800080"];
        
        const staffStartY = currentMode === 'treble' ? canvas.height/2 + 2*s : canvas.height/2 - 2*s;
        
        for (let i = 0; i < curLv; i++) {
            const y = currentMode === 'treble' ? staffStartY - (i * s) : staffStartY + (i * s);
            ctx.strokeStyle = colors[i];
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(100, y); ctx.lineTo(900, y);
            ctx.stroke();
        }

        ctx.fillStyle = "#111";
        ctx.font = `${s * modeConf.fontSizeMult}px serif`;
        const clefY = currentMode === 'treble' ? staffStartY + modeConf.symbolOffset : staffStartY + 3*s + modeConf.symbolOffset;
        ctx.fillText(modeConf.clef, 110, clefY);

        if (targetNote) {
            const steps = modeConf.steps[targetNote];
            const y = currentMode === 'treble' ? staffStartY - (steps * (s/2)) : staffStartY + (steps * (s/2));
            const x = canvas.width / 2 + 100;
            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.ellipse(x, y, s * 0.66, s * 0.47, -Math.PI / 8, 0, 2 * Math.PI);
            ctx.fill();
            if (steps <= -2 || steps >= 10) {
                ctx.strokeStyle = "#333"; ctx.lineWidth = 5;
                ctx.beginPath(); ctx.moveTo(x - s, y); ctx.lineTo(x + s, y); ctx.stroke();
            }
        }
    }

    function nextQuestion() {
        isAnswering = false;
        const pool = config[currentMode].levels[curLv-1].notes;
        do { targetNote = pool[Math.floor(Math.random() * pool.length)]; } while (targetNote === lastTargetNote && pool.length > 1);
        lastTargetNote = targetNote;
        document.getElementById('count-display').innerText = `${11 - questionsLeft} / 10`;
        drawScene();
        generateChoices();
    }

    function generateChoices() {
        const correctLetter = targetNote.charAt(0);
        const allLetters = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
        let choices = [correctLetter];
        let others = allLetters.filter(l => l !== correctLetter).sort(() => Math.random() - 0.5);
        while (choices.length < 3) choices.push(others.pop());
        choices.sort(() => Math.random() - 0.5);
        const area = document.getElementById('answer-area');
        area.innerHTML = '';
        choices.forEach(letter => {
            const btn = document.createElement('button');
            btn.className = 'animal-btn';
            const data = animalData[letter];
            btn.innerHTML = `<div class="img-container"><img src="${data.img}" class="animal-img" onerror="this.style.display='none'; this.parentElement.innerText='${data.emoji}';"></div><div class="letter-name">${letter}</div>`;
            btn.onclick = () => {
                if (isAnswering) return;
                isAnswering = true;
                if (letter === correctLetter) {
                    score++; btn.style.background = "#90EE90";
                    btn.querySelector('.letter-name').innerText = "✔️ " + letter;
                } else {
                    btn.style.background = "#FFB3B3"; btn.classList.add('shake-btn');
                    btn.querySelector('.letter-name').innerText = "❌ " + letter;
                }
                document.getElementById('score-val').innerText = score;
                setTimeout(() => { questionsLeft--; if (questionsLeft > 0) nextQuestion(); else showResult(); }, 400);
            };
            area.appendChild(btn);
        });
    }

    function showResult() {
        endTime = new Date();
        const duration = Math.floor((endTime - startTime) / 1000);
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('mode-view').style.display = 'none';
        document.getElementById('level-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'block';
        document.getElementById('result-text').innerText = `獲得分數：${score} / 10`;
        document.getElementById('time-text').innerText = `耗時：${duration} 秒`;
    }

    function saveRecord() {
        const name = document.getElementById('playerNameInput').value.trim() || "匿名";
        const duration = Math.floor((endTime - startTime) / 1000);
        const record = { name, mode: currentMode === 'treble' ? "高音" : "低音", lv: curLv, score, time: duration, date: new Date().toLocaleDateString() };
        let history = JSON.parse(localStorage.getItem('cmsNoteRankCombinedArt') || "[]");
        history.push(record);
        localStorage.setItem('cmsNoteRankCombinedArt', JSON.stringify(history));
    }

    function submitAndRestart() { saveRecord(); startGame(curLv); }
    function submitAndGoHome() { saveRecord(); goHome(); }

    function goHome() {
        document.getElementById('playerNameInput').value = "";
        document.getElementById('result-view').style.display = 'none';
        document.getElementById('mode-view').style.display = 'flex';
        document.getElementById('stats-bar').style.visibility = 'hidden';
        targetNote = ""; drawScene();
    }

    function goBackToMode() {
        document.getElementById('level-view').style.display = 'none';
        document.getElementById('rank-view').style.display = 'none';
        document.getElementById('mode-view').style.display = 'flex';
        document.getElementById('stats-bar').style.visibility = 'hidden';
        targetNote = ""; drawScene();
    }

    function showRank() {
        document.getElementById('mode-view').style.display = 'none';
        document.getElementById('rank-view').style.display = 'flex';
        let data = JSON.parse(localStorage.getItem('cmsNoteRankCombinedArt') || "[]");
        data.sort((a, b) => b.score - a.score || a.time - b.time);
        const body = document.getElementById('rank-body');
        body.innerHTML = data.slice(0, 20).map((d, i) => `<tr><td>${i+1}</td><td>${d.name}</td><td>${d.mode}</td><td>${d.lv}</td><td>${d.score}</td><td>${d.time}s</td></tr>`).join('') || '<tr><td colspan="6">未有紀錄</td></tr>';
    }

    window.onload = () => drawScene();
</script>
</body>
</html>
